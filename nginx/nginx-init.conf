# Временный HTTP-only конфиг для первого получения сертификата Let's Encrypt.
# deploy.sh временно ставит этот файл вместо nginx.conf, запускает certbot,
# затем возвращает nginx.conf и перезагружает nginx.
server {
    listen 80;
    server_name maxmazunin.ru www.maxmazunin.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Initializing SSL...\n';
        add_header Content-Type text/plain;
    }
}
